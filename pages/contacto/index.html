<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Contacto</title>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-sm bg-dark navbar-dark justify-content-center sticky-top"
      id="barNav"
    ></nav>
    <main class="bg-light">
      <div><h1>Contacto</h1></div>
      <div class="w-50">
        <form>
          <label for="formContactoNombre" class="form-label">Nombre</label>
          <input
            type="text"
            name="formContactoNombre"
            id="formContactoNombre"
            class="form-control"
            required
          />
          <label for="formContactoApp" class="form-label">Apellido Paterno</label>
          <input
            type="text"
            name="formContactoApp"
            id="formContactoApp"
            class="form-control"
            required
          />
          <label for="formContactoApm" class="form-label">Apellido Materno</label>
          <input
            type="text"
            name="formContactoApm"
            id="formContactoApm"
            class="form-control"
          />
          <label for="formContactoCorreo" class="form-label">Correo Electronico</label>
          <input
            type="email"
            name="formContactoCorreo"
            id="formContactoCorreo"
            class="form-control"
          />

          <div><input type="submit" class="btn btn-purple" value="Enviar Informacion" /></div>
        </form>
      </div>

      <div>
        <h2>Direccion</h2>
        <p class="text-secondary">
          Pedro de Alba SN, Niños Héroes, Ciudad Universitaria, 66455 San Nicolás de los Garza,
          N.L.
        </p>
      </div>
      <div>
        <h2>Contactos</h2>
        <div></div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/barNav.js"></script>
  </body>
</html>
