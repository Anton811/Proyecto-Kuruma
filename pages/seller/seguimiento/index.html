<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Kuruma</title>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-sm bg-dark navbar-dark justify-content-center sticky-top"
      id="barNav"
    ></nav>
    <main class="bg-light">
      <div class="row">
        <div
          id="barSeller"
          class="col-3 border border-secondary px-0 min-vh-100 d-flex justify-content-center align-items-center"
        ></div>
        <div class="col-9">
          <div><h1>Seguimiento de Venta</h1></div>
          <div class="container">
            <div class="bg-white rounded-3 p-3">
              <h2 id="nombreAuto"></h2>
              <div class="d-flex justify-content-around">
                <p id="folio"></p>
                <p id="fecha"></p>
              </div>
              <div class="d-flex justify-content-around">
                <p id="cliente"></p>
                <p id="estatus"></p>
              </div>
              <div class="container">
                <div id="content"></div>
                <div class="clearfix">
                  <button class="btn btn-danger float-end" id="btnCancelar">
                    Cancelar compra
                  </button>
                  <button class="btn btn-purple float-end me-2" id="btnContinuar">
                    Continuar Venta
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/barNav.js"></script>
    <script type="module" src="/src/barSeller.js"></script>
    <script src="script.js"></script>
  </body>
</html>
