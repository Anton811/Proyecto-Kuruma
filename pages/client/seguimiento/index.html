<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Kuruma</title>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-sm bg-dark navbar-dark justify-content-center sticky-top"
      id="barNav"

    <main class="bg-light">
      <div class="row">
        <div

        ></div>
        <div class="col-9">
          <div><h1>Seguimiento de Compra</h1></div>
          <div class="container">

              <div class="d-flex justify-content-around">
                <p>folio:</p>
                <p>fecha:</p>
              </div>

                </div>
                <div><p>Estatus:</p></div>
                <div><p>Descripcion:</p></div>
                <div><p>Fecha estimada de entrega</p></div>

                  <button class="btn btn-danger float-end">Cancelar compra</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script
