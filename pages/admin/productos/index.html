<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Kuruma</title>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-sm bg-dark navbar-dark justify-content-center sticky-top"
      id="barNav"
    ></nav>
    <main class="bg-light">
      <div class="row">
        <div
          id="barAdmin"
          class="col-3 border border-secondary px-0 min-vh-100 d-flex justify-content-center align-items-center"
        ></div>
        <div class="col-9">
          <div><h1>Productos</h1></div>
          <div>
            <input type="search" name="buscarProducto" id="buscarProducto" />
            <button
              class="btn btn-purple"
              data-bs-toggle="modal"
              data-bs-target="#modalAgregarAuto"
            >
              Agregar +
            </button>
          </div>
          <div class="container">
            <table class="table">
              <thead>
                <th>ID</th>
                <th>Nombre</th>
                <th>Categoria</th>
                <th></th>
              </thead>
              <tbody id="tableProductos"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <!-- Modal para agregar Auto -->
    <div class="fade modal" id="modalAgregarAuto">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title">Crear Auto</h4>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="formAgregarAuto">
            <div class="modal-body">
              <label for="formAgregarAutoNombre">Nombre</label
              ><input
                type="text"
                name="formAgregarAutoNombre"
                id="formAgregarAutoNombre"
                class="form-control"
                required
              />
              <label for="formAgregarAutoCarroceria">Carroceria</label>
              <select
                name="formAgregarAutoCarroceria"
                id="formAgregarAutoCarroceria"
                class="form-select"
                required
              >
                <option value="Kuruma Sports">Kuruma Sports</option>
                <option value="Need For Speed">Need For Speed</option>
                <option value="McQueen">McQueen</option>
                <option value="Meteoro">Meteoro</option>
              </select>
              <label for="formAgregarAutoColor">Color</label>
              <select
                name="formAgregarAutoColor"
                id="formAgregarAutoColor"
                class="form-select"
                required
              >
                <option value="Amarillo">Amarillo</option>
                <option value="Azul">Azul</option>
                <option value="Rojo">Rojo</option>
                <option value="Plateado">Plateado</option>
                <option value="Morado">Morado</option>
              </select>
              <label for="formAgregarAutoMotor">Motor</label>
              <select
                name="formAgregarAutoMotor"
                id="formAgregarAutoMotor"
                class="form-select"
                required
              >
                <option value="V4">V4</option>
                <option value="V6">V6</option>
                <option value="V8">V8</option>
              </select>
              <label for="formAgregarAutoTransmision">Transmision</label>
              <select
                name="formAgregarAutoTransmision"
                id="formAgregarAutoTransmision"
                class="form-select"
                required
              >
                <option value="Manual">Manual</option>
                <option value="Automatico">Automatico</option>
              </select>
              <label for="formAgregarAutoAnio">Año</label>
              <input
                type="number"
                name="formAgregarAutoAnio"
                id="formAgregarAutoAnio"
                class="form-control"
                minlength="4"
                maxlength="4"
              />
              <label for="formAgregarAutoPrecio">Precio</label>
              <input
                type="number"
                name="formAgregarAutoPrecio"
                id="formAgregarAutoPrecio"
                class="form-control"
              />
              <label for="formAgregarAutoDescripcion">Descripcion</label>
              <textarea
                name="formAgregarAutoDescripcion"
                id="formAgregarAutoDescripcion"
                cols="30"
                rows="10"
                class="form-control"
              ></textarea>
            </div>

            <!-- Modal footer -->
            <div class="modal-footer">
              <button type="submit" class="btn btn-purple">Crear</button>
              <button type="button" class="btn btn-danger" data-bs-dismiss="modal">
                Cerrar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Modal para modificar Auto -->
    <div class="fade modal" id="modalModificarAuto">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title">Crear Auto</h4>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="formModificarAuto">
            <div class="modal-body">
              <input type="hidden" id="formModificarAutoId" />
              <label for="formModificarAutoNombre">Nombre</label
              ><input
                type="text"
                name="formModificarAutoNombre"
                id="formModificarAutoNombre"
                class="form-control"
                required
              />
              <label for="formModificarAutoCarroceria">Carroceria</label>
              <select
                name="formModificarAutoCarroceria"
                id="formModificarAutoCarroceria"
                class="form-select"
                required
              >
                <option value="Kuruma Sports">Kuruma Sports</option>
                <option value="Need For Speed">Need For Speed</option>
                <option value="McQueen">McQueen</option>
                <option value="Meteoro">Meteoro</option>
              </select>
              <label for="formModificarAutoColor">Color</label>
              <select
                name="formModificarAutoColor"
                id="formModificarAutoColor"
                class="form-select"
                required
              >
                <option value="Amarillo">Amarillo</option>
                <option value="Azul">Azul</option>
                <option value="Rojo">Rojo</option>
                <option value="Plateado">Plateado</option>
                <option value="Morado">Morado</option>
              </select>
              <label for="formModificarAutoMotor">Motor</label>
              <select
                name="formModificarAutoMotor"
                id="formModificarAutoMotor"
                class="form-select"
                required
              >
                <option value="V4">V4</option>
                <option value="V6">V6</option>
                <option value="V8">V8</option>
              </select>
              <label for="formModificarAutoTransmision">Transmision</label>
              <select
                name="formModificarAutoTransmision"
                id="formModificarAutoTransmision"
                class="form-select"
                required
              >
                <option value="Manual">Manual</option>
                <option value="Automatico">Automatico</option>
              </select>
              <label for="formModificarAutoAnio">Año</label>
              <input
                type="number"
                name="formModificarAutoAnio"
                id="formModificarAutoAnio"
                class="form-control"
                minlength="4"
                maxlength="4"
              />
              <label for="formModificarAutoPrecio">Precio</label>
              <input
                type="number"
                name="formModificarAutoPrecio"
                id="formModificarAutoPrecio"
                class="form-control"
              />
              <label for="formModificarAutoDescripcion">Descripcion</label>
              <textarea
                name="formModificarAutoDescripcion"
                id="formModificarAutoDescripcion"
                cols="30"
                rows="10"
                class="form-control"
              ></textarea>
            </div>

            <!-- Modal footer -->
            <div class="modal-footer">
              <button type="submit" class="btn btn-purple">Crear</button>
              <button type="button" class="btn btn-danger" data-bs-dismiss="modal">
                Cerrar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/barNav.js"></script>
    <script type="module" src="/src/barAdmin.js"></script>
    <script src="script.js"></script>
  </body>
</html>
