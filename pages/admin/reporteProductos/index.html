<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Kuruma</title>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-sm bg-dark navbar-dark justify-content-center sticky-top"
      id="barNav"
    ></nav>
    <main class="bg-light">
      <div class="row">
        <div
          id="barAdmin"
          class="col-3 border border-secondary px-0 min-vh-100 d-flex justify-content-center align-items-center"
        ></div>
        <div class="col-9">
          <div><h1>Reporte de Productos</h1></div>
          <div class="container">
            <div class="bg-white rounded-3 p-3">
              <div class="d-flex align-items-end gap-3 mb-3">
                <div>
                  <p class="mb-1">Fecha Inicial</p>
                  <input type="date" id="fechaInicial" class="form-control" />
                </div>
                <div>
                  <p class="mb-1">Fecha Final</p>
                  <input type="date" id="fechaFinal" class="form-control" />
                </div>
                <div>
                  <p class="mb-1">Vendedor</p>
                  <select id="selectVendedor" class="form-select"></select>
                </div>
                <div>
                  <button class="btn btn-purple" id="btnFiltrar">Filtrar</button>
                </div>
              </div>

              <div class="container">
                <table class="table">
                  <thead>
                    <th>Folio</th>
                    <th>Producto</th>
                    <th>Fecha</th>
                  </thead>
                  <tbody id="tableProductos"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/barNav.js"></script>
    <script type="module" src="/src/barAdmin.js"></script>
    <script src="script.js"></script>
  </body>
</html>
